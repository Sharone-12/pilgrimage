<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pilgrimage — About</title>
  <style>
    :root {
      --paper: #F5ECD7;
      --ink: #1a1a2e;
      --vermillion: #C0392B;
      --vermillion-dark: #742219;
      --gold: #C9A84C;
      font-family: "Noto Serif", "Songti SC", Georgia, serif;
      color: var(--ink);
      background: #0d0a06;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ── stage ── */
    .landing {
      align-items: center;
      display: flex;
      height: 100svh;
      isolation: isolate;
      min-height: 620px;
      overflow: hidden;
      padding: 108px max(28px, calc((100vw - 1260px) / 2)) 60px;
      position: relative;
      width: 100vw;
    }

    /* ── background painting ── */
    .painting {
      inset: 0;
      position: absolute;
      z-index: 0;
    }

    .painting img {
      display: block;
      height: 100%;
      object-fit: cover;
      object-position: 72% center;
      width: 100%;
      filter: saturate(0.82) contrast(1.06) brightness(0.72) sepia(0.06);
    }

    /* cinematic vignette */
    .vignette {
      background:
        radial-gradient(ellipse 110% 90% at 50% 50%,
          transparent 30%, rgba(8,4,2,0.45) 70%, rgba(4,2,0,0.80) 100%),
        linear-gradient(90deg,
          rgba(6,3,1,0.60) 0%, rgba(6,3,1,0.12) 32%,
          rgba(6,3,1,0.02) 55%, rgba(6,3,1,0.28) 100%);
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: 1;
    }

    /* grain */
    .grain {
      background:
        radial-gradient(circle at 17% 21%, rgba(26,26,46,0.09) 0 1px, transparent 2px),
        radial-gradient(circle at 79% 63%, rgba(116,34,25,0.10) 0 1px, transparent 2px),
        radial-gradient(circle at 53% 31%, rgba(201,168,76,0.09) 0 1px, transparent 2px);
      background-size: 88px 104px, 134px 118px, 170px 146px;
      inset: 0;
      mix-blend-mode: overlay;
      opacity: 0.5;
      pointer-events: none;
      position: absolute;
      z-index: 2;
      animation: grainWalk 8s steps(4) infinite;
    }

    /* edge burn */
    .edge-burn {
      box-shadow: inset 0 0 100px rgba(6,2,0,0.55), inset 0 0 200px rgba(4,1,0,0.28);
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: 3;
    }

    /* ── nav ── */
    .nav {
      align-items: center;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr auto 1fr;
      left: max(28px, calc((100vw - 1260px) / 2));
      position: absolute;
      right: max(28px, calc((100vw - 1260px) / 2));
      top: 28px;
      z-index: 6;
      animation: navDrop 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    .nav-group { display: flex; gap: 16px; justify-content: center; }
    .nav-group:first-child { justify-content: flex-start; }
    .nav-group:last-child  { justify-content: flex-end; }

    .tab {
      align-items: center;
      background:
        radial-gradient(circle at 34% 26%, rgba(255,150,126,0.30), transparent 32%),
        linear-gradient(175deg, #d84838, #6b1f14);
      border: 2.5px solid rgba(80,16,10,0.90);
      border-radius: 44% 56% 48% 52% / 52% 43% 57% 48%;
      box-shadow:
        inset 0 0 0 2.5px rgba(245,236,215,0.18),
        inset 0 -8px 18px rgba(40,6,3,0.30),
        0 6px 22px rgba(40,6,3,0.42);
      color: var(--paper);
      display: inline-flex;
      font-family: "Songti SC","STSong","Noto Serif",serif;
      font-size: clamp(0.68rem, 0.8vw, 0.88rem);
      font-weight: 900;
      justify-content: center;
      letter-spacing: 0.14em;
      min-height: 62px;
      min-width: 82px;
      padding: 12px 15px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45);
      text-transform: uppercase;
      transition: filter 160ms ease, transform 160ms ease;
    }

    .tab.active {
      background:
        radial-gradient(circle at 34% 26%, rgba(255,210,150,0.32), transparent 32%),
        linear-gradient(175deg, #c9a84c, #8a6820);
      border-color: rgba(80,55,8,0.90);
    }

    .tab:hover { filter: saturate(1.2) brightness(1.1) drop-shadow(0 0 10px rgba(192,57,43,0.55)); transform: translateY(2px); }
    .nav-group:nth-child(2) .tab:nth-child(odd)  { transform: rotate(-2.5deg); }
    .nav-group:nth-child(2) .tab:nth-child(even) { transform: rotate(2.5deg); }
    .nav-group:nth-child(2) .tab:hover           { transform: translateY(2px) rotate(0deg); }

    /* ── about panel ── */
    .about-panel {
      max-width: min(580px, 48vw);
      position: relative;
      z-index: 5;
    }

    /* eyebrow — small gold label, hidden on mobile */
    .about-eyebrow {
      color: var(--gold);
      font-size: clamp(0.6rem, 0.78vw, 0.80rem);
      font-weight: 900;
      letter-spacing: 0.30em;
      margin-bottom: 1.0rem;
      opacity: 0;
      text-shadow: 0 1px 6px rgba(0,0,0,0.50);
      text-transform: uppercase;
      animation: fadeSlideUp 0.5s 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* title — ink-brush reveal from left */
    .about-title {
      clip-path: inset(0 100% 0 0);
      color: var(--vermillion);
      font-family: "Songti SC","STSong","Noto Serif",serif;
      font-size: clamp(2.2rem, 4vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1.02;
      margin-bottom: 1.2rem;
      text-shadow:
        3px 3px 0 rgba(116,34,25,0.55),
        0 8px 28px rgba(0,0,0,0.55);
      text-transform: uppercase;
      animation: inkReveal 0.9s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    /* divider — draws left to right */
    .divider {
      background: linear-gradient(90deg,
        var(--vermillion-dark), var(--gold) 55%, rgba(192,57,43,0.40));
      border: none;
      height: 2px;
      margin-bottom: 1.4rem;
      transform-origin: left center;
      transform: scaleX(0);
      width: min(180px, 30vw);
      animation: drawLine 0.6s 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* body */
    .about-body {
      display: grid;
      gap: 1.0rem;
      margin-bottom: 1.6rem;
    }

    .about-body p {
      color: var(--paper);
      font-size: clamp(0.88rem, 1.05vw, 1.06rem);
      line-height: 1.80;
      min-height: 1.8em; /* prevents layout jump during typing */
      opacity: 0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.55);
    }

    .about-body p.visible { opacity: 1; }

    /* blinking cursor */
    .cursor {
      animation: blink 0.7s steps(1) infinite;
      color: var(--gold);
      font-weight: 900;
    }

    /* CTA */
    .about-cta {
      align-items: center;
      background:
        radial-gradient(circle at 36% 22%, rgba(255,148,118,0.28), transparent 30%),
        linear-gradient(175deg, #d84838, #6b1f14);
      border: 2.5px solid rgba(80,16,10,0.92);
      border-radius: 44% 56% 48% 52% / 52% 43% 57% 48%;
      box-shadow:
        inset 0 0 0 3px rgba(245,236,215,0.16),
        inset 0 -10px 22px rgba(40,6,3,0.30),
        0 8px 24px rgba(40,6,3,0.55);
      color: var(--paper);
      display: inline-flex;
      font-family: "Songti SC","STSong","Noto Serif",serif;
      font-size: clamp(0.9rem, 1.05vw, 1.05rem);
      font-weight: 900;
      justify-content: center;
      letter-spacing: 0.12em;
      min-height: 66px;
      min-width: 260px;
      opacity: 0;
      padding: 16px 40px 14px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.45);
      text-transform: uppercase;
      transform: translateY(12px);
      transition: filter 200ms ease, transform 200ms ease, box-shadow 200ms ease;
    }

    .about-cta.visible {
      animation: ctaBounceIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .about-cta:hover {
      filter: saturate(1.2) brightness(1.1) drop-shadow(0 0 16px rgba(192,57,43,0.60));
      transform: translateY(3px) rotate(-1deg);
    }

    /* ── seal — bottom RIGHT so it never clashes with left-panel CTA ── */
    .seal {
      align-items: center;
      background: var(--vermillion);
      border: 3px solid var(--vermillion-dark);
      bottom: 30px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.50), inset 0 0 0 2px rgba(245,236,215,0.18);
      color: var(--paper);
      display: grid;
      font-family: "Songti SC","STSong",serif;
      font-size: 1.45rem;
      height: 64px;
      line-height: 1;
      place-items: center;
      position: absolute;
      right: max(28px, calc((100vw - 1260px) / 2));
      text-shadow: 1px 1px 0 rgba(0,0,0,0.30);
      width: 64px;
      writing-mode: vertical-rl;
      z-index: 6;
      animation: sealPop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* ── keyframes ── */
    @keyframes navDrop {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* clip-path wipe: right edge sweeps from 100% → 0% */
    @keyframes inkReveal {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }

    @keyframes drawLine {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    @keyframes ctaBounceIn {
      from { opacity: 0; transform: translateY(12px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes sealPop {
      from { opacity: 0; transform: scale(0.7) rotate(-8deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes grainWalk {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-2px,2px); }
      50%  { transform: translate(2px,-2px); }
      75%  { transform: translate(-1px,3px); }
      100% { transform: translate(0,0); }
    }

    /* ── mobile ── */
    @media (max-width: 760px) {
      html, body { overflow: auto; }

      .landing {
        align-items: flex-start;
        height: auto;
        min-height: 100svh;
        overflow: visible;
        padding: 110px 18px 100px;
      }

      .about-panel { max-width: 100%; }

      .nav {
        display: flex;
        justify-content: space-between;
        left: 18px;
        right: 18px;
        top: 18px;
      }

      .nav-group:nth-child(2) { display: none; }
      .tab { min-height: 48px; min-width: 80px; padding: 10px 12px; }

      .seal { bottom: 18px; right: 18px; }
    }
  </style>
</head>
<body>
  <main class="landing">

    <nav class="nav" aria-label="Site navigation">
      <div class="nav-group">
        <a class="tab" href="index.html">Pilgrim</a>
      </div>
      <div class="nav-group">
        <a class="tab active" href="about.html">About</a>
        <a class="tab" href="demons.html">Demons</a>
        <a class="tab" href="arena.html">Arena</a>
        <a class="tab" href="bosses.html">Bosses</a>
      </div>
      <div class="nav-group">
        <a class="tab" href="arena.html">Start</a>
      </div>
    </nav>

    <div class="painting" aria-hidden="true">
      <img src="about.png" width="1200" height="800" alt="">
    </div>
    <div class="vignette"  aria-hidden="true"></div>
    <div class="grain"     aria-hidden="true"></div>
    <div class="edge-burn" aria-hidden="true"></div>

    <article class="about-panel">
      <p class="about-eyebrow">齐天大圣 &nbsp;·&nbsp; Great Sage Equal to Heaven</p>
      <h2 class="about-title">The Road<br>Demands Blood</h2>
      <hr class="divider">
      <div class="about-body">
        <p id="p1"></p>
        <p id="p2"></p>
        <p id="p3"></p>
      </div>
      <a class="about-cta" id="cta" href="arena.html">Begin the Journey</a>
    </article>

    <div class="seal" aria-hidden="true">西行</div>
  </main>

  <script>
    const lines = [
      {
        el: document.getElementById('p1'),
        text: 'You are Sun Wukong — trickster, warrior, once-rebel against Heaven itself. The Tang Monk walks ahead. The western paradise waits. But between here and enlightenment stands a thousand miles of wilderness, and in that wilderness, every shadow has a mind. Demons do not simply block the road. They are the road.'
      },
      {
        el: document.getElementById('p2'),
        text: 'Each demon you face is a living philosophy — a being of pure cognitive nature, twisted into hunger. One feeds on flattery. Another collapses under precision. A third unravels when met with paradox. Your staff cannot touch what lives only in thought. But a perfectly aimed prompt can split a demon\'s nature wide open. Craft your words well, and the Judge reads the wound — zero to one hundred, dealt straight to their soul. Miss the mark, and they answer with teeth.'
      },
      {
        el: document.getElementById('p3'),
        text: 'This is not a game about reflexes. It is a game about understanding. The Monkey King did not earn his title through strength alone — he outthought gods, outwitted dragons, and read the shape of every enemy before the first blow fell. Now it is your turn. The scripture will not carry itself. The road does not open for the silent. Speak — and let Heaven judge whether you are worthy.'
      }
    ];

    const CHAR_DELAY  = 22;   // ms per character
    const PARA_GAP    = 320;  // ms pause between paragraphs
    const START_DELAY = 1700; // ms after page load before typing begins

    function typeText(el, text, onDone) {
      el.classList.add('visible');
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.textContent = '|';
      el.appendChild(cursor);

      const tick = () => {
        if (i < text.length) {
          // insert char before cursor
          cursor.insertAdjacentText('beforebegin', text[i]);
          i++;
          setTimeout(tick, CHAR_DELAY + (Math.random() * 14 - 7));
        } else {
          // done — remove cursor
          cursor.remove();
          if (onDone) onDone();
        }
      };
      tick();
    }

    function runSequence(index) {
      if (index >= lines.length) {
        // all paragraphs done — show CTA
        const cta = document.getElementById('cta');
        cta.classList.add('visible');
        return;
      }
      typeText(lines[index].el, lines[index].text, () => {
        setTimeout(() => runSequence(index + 1), PARA_GAP);
      });
    }

    setTimeout(() => runSequence(0), START_DELAY);
  </script>
</body>
</html>
