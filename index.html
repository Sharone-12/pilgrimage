<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pilgrimage</title>
  <style>
    :root {
      --paper: #F5ECD7;
      --paper-deep: #dfc898;
      --ink: #1a1a2e;
      --vermillion: #C0392B;
      --vermillion-dark: #742219;
      --gold: #C9A84C;
      --jade: #476f62;
      font-family: "Noto Serif", "Songti SC", Georgia, serif;
      color: var(--ink);
      background: var(--paper);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .landing {
      background:
        linear-gradient(90deg, rgba(74, 45, 21, 0.16), transparent 8%, transparent 92%, rgba(74, 45, 21, 0.16)),
        repeating-linear-gradient(0deg, rgba(80, 52, 25, 0.065) 0 2px, transparent 2px 15px),
        radial-gradient(circle at 18% 10%, rgba(201, 168, 76, 0.24), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(71, 111, 98, 0.18), transparent 24%),
        linear-gradient(180deg, #fff6df 0%, var(--paper) 52%, #ead6aa 100%);
      height: 100svh;
      isolation: isolate;
      min-height: 620px;
      overflow: hidden;
      position: relative;
      width: 100vw;
    }

    .landing::before {
      background:
        radial-gradient(ellipse at center, rgba(245, 236, 215, 0.08), rgba(245, 236, 215, 0.38) 76%, rgba(245, 236, 215, 0.68) 100%);
      animation: paperPulse 7s ease-in-out infinite;
      content: "";
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: -1;
    }

    .landing::after {
      background:
        radial-gradient(circle at 18% 22%, rgba(26, 26, 46, 0.08) 0 1px, transparent 2px),
        radial-gradient(circle at 78% 64%, rgba(116, 34, 25, 0.09) 0 1px, transparent 2px),
        radial-gradient(circle at 52% 30%, rgba(201, 168, 76, 0.08) 0 1px, transparent 2px);
      background-size: 91px 107px, 137px 121px, 173px 149px;
      content: "";
      inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.48;
      pointer-events: none;
      position: absolute;
      z-index: 2;
      animation: grainWalk 9s steps(5) infinite;
    }

    .painting {
      inset: 0;
      opacity: 1;
      position: absolute;
      width: 100%;
      z-index: 0;
    }

    .painting img {
      animation: mountainDrift 140s ease-in-out infinite;
      display: block;
      height: 100%;
      image-rendering: auto;
      object-fit: cover;
      object-position: center top;
      filter: saturate(1.06) contrast(1.02);
      width: 100%;
    }

    .ink-fade {
      background:
        radial-gradient(ellipse at center, rgba(245, 236, 215, 0.02) 0%, rgba(245, 236, 215, 0.12) 48%, rgba(245, 236, 215, 0.5) 100%),
        linear-gradient(90deg, rgba(245, 236, 215, 0.56) 0%, rgba(245, 236, 215, 0.08) 30%, rgba(245, 236, 215, 0.08) 70%, rgba(245, 236, 215, 0.56) 100%),
        linear-gradient(180deg, rgba(245, 236, 215, 0.18) 0%, rgba(245, 236, 215, 0.03) 54%, rgba(245, 236, 215, 0.5) 100%);
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: 1;
    }

    .nav {
      align-items: center;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr auto 1fr;
      left: max(24px, calc((100vw - 1260px) / 2));
      position: absolute;
      right: max(24px, calc((100vw - 1260px) / 2));
      top: 34px;
      z-index: 4;
    }

    .nav-group {
      display: flex;
      gap: 18px;
      justify-content: center;
    }

    .nav-group:first-child {
      justify-content: flex-start;
    }

    .nav-group:last-child {
      justify-content: flex-end;
    }

    .tab {
      align-items: center;
      background:
        radial-gradient(circle at 35% 28%, rgba(255, 145, 120, 0.28), transparent 30%),
        linear-gradient(180deg, #d44736, var(--vermillion-dark));
      border: 3px solid rgba(92, 22, 15, 0.88);
      border-radius: 44% 56% 48% 52% / 52% 43% 57% 48%;
      box-shadow:
        inset 0 0 0 3px rgba(245, 236, 215, 0.16),
        inset 0 -10px 22px rgba(47, 8, 5, 0.24),
        0 8px 18px rgba(47, 8, 5, 0.2);
      color: var(--paper);
      display: inline-flex;
      font-family: "Songti SC", "STSong", "Noto Serif", serif;
      font-size: clamp(0.72rem, 0.82vw, 0.9rem);
      font-weight: 900;
      justify-content: center;
      letter-spacing: 0.12em;
      min-height: 64px;
      min-width: 82px;
      padding: 12px 15px;
      position: relative;
      text-transform: uppercase;
      transition: filter 180ms ease, transform 180ms ease;
    }

    .tab:hover {
      filter: saturate(1.18) drop-shadow(0 0 13px rgba(192, 57, 43, 0.5));
      transform: translateY(2px) rotate(-2deg);
    }

    .nav-group:nth-child(2) .tab:nth-child(even) {
      transform: rotate(2deg);
    }

    .nav-group:nth-child(2) .tab:nth-child(odd) {
      transform: rotate(-2deg);
    }

    .nav-group:nth-child(2) .tab:hover {
      transform: translateY(2px) rotate(0deg);
    }

    .hero-copy {
      display: grid;
      gap: clamp(1rem, 2.4vw, 1.9rem);
      left: 50%;
      place-items: center;
      position: absolute;
      text-align: center;
      top: 49%;
      transform: translate(-50%, -50%);
      width: min(92vw, 1420px);
      z-index: 3;
    }

    .wordmark {
      animation: titleAura 5.8s ease-in-out infinite;
      display: block;
      filter:
        drop-shadow(0 0 0 rgba(192, 57, 43, 0))
        drop-shadow(0 18px 24px rgba(61, 31, 14, 0.25));
      height: auto;
      overflow: visible;
      transition: filter 220ms ease, transform 220ms ease;
      width: min(92vw, 1380px);
    }

    .wordmark .word-main,
    .wordmark:hover .word-main {
      fill: var(--vermillion);
      stroke: #742219;
      stroke-width: 8;
    }

    .wordmark .word-rim,
    .wordmark:hover .word-rim {
      stroke: #C9A84C;
      stroke-width: 3.5;
    }

    .tagline {
      color: var(--vermillion-dark);
      font-size: clamp(1.2rem, 2.1vw, 2.35rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1.12;
      margin: 0;
      max-width: 820px;
      text-shadow:
        0 2px 0 rgba(245, 236, 215, 0.8),
        1px 1px 0 rgba(201, 168, 76, 0.34);
      text-transform: uppercase;
    }

    .start-button {
      align-items: center;
      background:
        radial-gradient(circle at 36% 22%, rgba(255, 144, 113, 0.25), transparent 28%),
        linear-gradient(180deg, #d44736, var(--vermillion-dark));
      border: 3px solid rgba(92, 22, 15, 0.92);
      border-radius: 44% 56% 48% 52% / 52% 43% 57% 48%;
      box-shadow:
        inset 0 0 0 4px rgba(245, 236, 215, 0.16),
        inset 0 -12px 24px rgba(47, 8, 5, 0.24),
        0 9px 20px rgba(47, 8, 5, 0.22);
      color: var(--paper);
      display: inline-flex;
      font-family: "Songti SC", "STSong", "Noto Serif", serif;
      font-size: clamp(1rem, 1.22vw, 1.22rem);
      font-weight: 900;
      justify-content: center;
      letter-spacing: 0.1em;
      min-height: 74px;
      min-width: 330px;
      margin-top: 1.2rem;
      overflow: visible;
      padding: 18px 44px 16px;
      position: relative;
      text-align: center;
      text-transform: uppercase;
      transition: box-shadow 220ms ease, transform 220ms ease;
      white-space: nowrap;
    }

    .start-button:hover {
      filter: saturate(1.18) drop-shadow(0 0 15px rgba(192, 57, 43, 0.55));
      box-shadow:
        inset 0 0 0 4px rgba(245, 236, 215, 0.22),
        inset 0 -12px 24px rgba(47, 8, 5, 0.2),
        0 0 24px rgba(192, 57, 43, 0.42),
        0 8px 18px rgba(47, 8, 5, 0.22);
      transform: translateY(2px) rotate(-1deg);
    }

    .seal {
      align-items: center;
      background: var(--vermillion);
      border: 4px solid var(--vermillion-dark);
      bottom: 34px;
      color: var(--paper);
      display: grid;
      font-family: "Songti SC", "STSong", serif;
      font-size: 1.55rem;
      height: 64px;
      left: max(28px, calc((100vw - 1260px) / 2));
      line-height: 1;
      place-items: center;
      position: absolute;
      width: 64px;
      writing-mode: vertical-rl;
      z-index: 3;
    }

    @keyframes paperPulse {
      0%, 100% {
        opacity: 0.9;
      }
      50% {
        opacity: 0.66;
      }
    }

    @keyframes grainWalk {
      0% {
        transform: translate(0, 0);
      }
      33% {
        transform: translate(-2px, 1px);
      }
      66% {
        transform: translate(2px, -1px);
      }
      100% {
        transform: translate(0, 0);
      }
    }

    @keyframes mountainDrift {
      0% {
        object-position: center top;
        transform: scale(1.01);
      }
      50% {
        object-position: center bottom;
        transform: scale(1.01);
      }
      100% {
        object-position: center top;
        transform: scale(1.01);
      }
    }

    @keyframes titleAura {
      0%, 100% {
        filter:
          drop-shadow(0 0 0 rgba(192, 57, 43, 0))
          drop-shadow(0 18px 24px rgba(61, 31, 14, 0.25));
      }
      50% {
        filter:
          drop-shadow(0 0 18px rgba(192, 57, 43, 0.34))
          drop-shadow(0 20px 26px rgba(61, 31, 14, 0.28));
      }
    }

    @media (max-width: 760px) {
      .landing {
        min-height: 560px;
      }

      .nav {
        display: flex;
        justify-content: space-between;
        left: 18px;
        right: 18px;
        top: 18px;
      }

      .nav-group:nth-child(2) {
        display: none;
      }

      .tab {
        min-height: 48px;
        min-width: 88px;
        padding: 10px 12px;
      }

      .start-button {
        min-width: 240px;
        padding-left: 28px;
        padding-right: 28px;
      }

      .wordmark {
        width: min(98vw, 1380px);
      }

      .hero-copy {
        top: 48%;
      }

      .seal {
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="landing">
    <nav class="nav" aria-label="Landing navigation">
      <div class="nav-group">
        <a class="tab" href="index.html">Pilgrim</a>
      </div>
      <div class="nav-group">
        <a class="tab" href="about.html">About</a>
        <a class="tab" href="demons.html">Demons</a>
        <a class="tab" href="arena.html">Arena</a>
        <a class="tab" href="bosses.html">Bosses</a>
      </div>
      <div class="nav-group">
        <a class="tab" href="arena.html">Start</a>
      </div>
    </nav>

    <div class="painting" aria-hidden="true">
      <img src="jtw2.png" width="1072" height="1467" alt="">
    </div>
    <div class="ink-fade" aria-hidden="true"></div>

    <section class="hero-copy" aria-labelledby="title">
      <svg class="wordmark" viewBox="0 0 1580 260" role="img" aria-label="Pilgrimage">
        <defs>
          <filter id="roughInk">
            <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="8" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.8" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <text class="word-main" x="790" y="188"
          text-anchor="middle"
          textLength="1460"
          lengthAdjust="spacingAndGlyphs"
          filter="url(#roughInk)"
          fill="#C0392B"
          stroke="#742219"
          stroke-width="8"
          paint-order="stroke fill"
          font-family="Songti SC, STSong, Kaiti SC, Noto Serif CJK SC, Georgia, serif"
          font-size="205"
          font-weight="900"
          letter-spacing="6">PILGRIMAGE</text>
        <text class="word-rim" x="790" y="188"
          text-anchor="middle"
          textLength="1460"
          lengthAdjust="spacingAndGlyphs"
          fill="none"
          stroke="#C9A84C"
          stroke-width="3.5"
          font-family="Songti SC, STSong, Kaiti SC, Noto Serif CJK SC, Georgia, serif"
          font-size="205"
          font-weight="900"
          letter-spacing="6">PILGRIMAGE</text>
      </svg>
      <p class="tagline">Defeat demons with prompts, not weapons</p>
      <a class="start-button" href="arena.html">Begin Pilgrimage</a>
    </section>

    <div class="seal" aria-hidden="true">西行</div>
  </main>
</body>
</html>
