<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pilgrimage — Demons</title>
  <style>
    :root {
      --paper: #F5ECD7;
      --ink: #1a1a2e;
      --vermillion: #C0392B;
      --vermillion-dark: #742219;
      --gold: #C9A84C;
      --mist: #8B9EA8;
      font-family: "Noto Serif", "Songti SC", Georgia, serif;
      color: var(--paper);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #0d0a06; }
    body {
      background:
        linear-gradient(rgba(8,4,2,0.78), rgba(8,4,2,0.92)),
        url('jtw2.png') center/cover no-repeat fixed;
      min-height: 100vh;
      padding: 140px max(28px, calc((100vw - 1260px) / 2)) 80px;
    }
    a { color: inherit; text-decoration: none; }

    /* ── nav ── (site original) */
    .nav {
      align-items: center;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr auto 1fr;
      left: max(28px, calc((100vw - 1260px) / 2));
      position: fixed;
      right: max(28px, calc((100vw - 1260px) / 2));
      top: 28px;
      z-index: 10;
    }
    .nav-group { display: flex; gap: 16px; justify-content: center; }
    .nav-group:first-child { justify-content: flex-start; }
    .nav-group:last-child  { justify-content: flex-end; }

    .tab {
      align-items: center;
      background:
        radial-gradient(circle at 34% 26%, rgba(255,150,126,0.30), transparent 32%),
        linear-gradient(175deg, #d84838, #6b1f14);
      border: 2.5px solid rgba(80,16,10,0.90);
      border-radius: 44% 56% 48% 52% / 52% 43% 57% 48%;
      box-shadow:
        inset 0 0 0 2.5px rgba(245,236,215,0.18),
        inset 0 -8px 18px rgba(40,6,3,0.30),
        0 6px 22px rgba(40,6,3,0.45);
      color: var(--paper);
      display: inline-flex;
      font-family: "Songti SC","STSong","Noto Serif",serif;
      font-size: clamp(0.68rem, 0.8vw, 0.88rem);
      font-weight: 900;
      justify-content: center;
      letter-spacing: 0.14em;
      min-height: 62px;
      min-width: 82px;
      padding: 12px 15px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45);
      text-transform: uppercase;
      transition: filter 160ms ease, transform 160ms ease;
    }
    .tab:hover {
      filter: saturate(1.2) brightness(1.1) drop-shadow(0 0 12px rgba(192,57,43,0.60));
      transform: translateY(2px);
    }
    .nav-group:nth-child(2) .tab:nth-child(odd)  { transform: rotate(-2.5deg); }
    .nav-group:nth-child(2) .tab:nth-child(even) { transform: rotate(2.5deg); }
    .nav-group:nth-child(2) .tab:hover           { transform: translateY(2px) rotate(0deg); }
    .tab.active {
      filter: saturate(1.25) brightness(1.08);
      box-shadow:
        inset 0 0 0 2.5px rgba(201,168,76,0.65),
        inset 0 -8px 18px rgba(40,6,3,0.30),
        0 6px 22px rgba(40,6,3,0.55),
        0 0 18px rgba(201,168,76,0.35);
    }

    /* ── header ── */
    .page-header {
      text-align: center;
      margin-bottom: 56px;
    }
    .page-eyebrow {
      color: var(--gold);
      font-size: 0.78rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .page-title {
      font-family: "Songti SC", STSong, serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1.05;
      margin-bottom: 18px;
    }
    .page-title .cjk {
      color: var(--vermillion);
      display: block;
      font-size: 0.55em;
      margin-top: 8px;
      opacity: 0.9;
    }
    .page-sub {
      color: rgba(245,236,215,0.66);
      font-size: 1rem;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.55;
    }

    .divider {
      border: 0;
      border-top: 1px solid rgba(201,168,76,0.35);
      margin: 28px auto 0;
      max-width: 200px;
    }

    /* ── grid ── */
    .demon-grid {
      display: grid;
      gap: 28px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    .card {
      background: rgba(15,8,4,0.78);
      border: 1px solid rgba(201,168,76,0.22);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 15%, rgba(192,57,43,0.10), transparent 60%),
        radial-gradient(circle at 80% 85%, rgba(201,168,76,0.06), transparent 55%);
      z-index: 0;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,168,76,0.55);
      box-shadow: 0 18px 38px rgba(0,0,0,0.55), 0 0 24px rgba(192,57,43,0.12);
    }

    .card-portrait {
      aspect-ratio: 4 / 5;
      background: #1a0f08;
      overflow: hidden;
      position: relative;
    }
    .card-portrait img {
      display: block;
      height: 100%;
      object-fit: cover;
      width: 100%;
      filter: saturate(0.88) contrast(1.05) brightness(0.92);
    }
    .card-portrait .placeholder {
      align-items: center;
      color: rgba(201,168,76,0.32);
      display: flex;
      font-family: "Songti SC", serif;
      font-size: 4rem;
      height: 100%;
      justify-content: center;
    }
    .card-portrait::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 55%, rgba(8,4,2,0.85));
      pointer-events: none;
    }

    .card-body {
      padding: 22px 22px 24px;
      position: relative;
      z-index: 1;
    }

    .card-eyebrow {
      color: var(--gold);
      font-size: 0.66rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card-eyebrow.tutorial { color: var(--mist); }
    .card-eyebrow.boss     { color: var(--vermillion); }

    .card-name {
      font-family: "Songti SC", STSong, serif;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .card-cjk {
      color: var(--vermillion);
      font-family: "Songti SC", serif;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .card-trait {
      color: rgba(245,236,215,0.78);
      font-size: 0.92rem;
      line-height: 1.55;
      margin-bottom: 14px;
    }
    .card-weakness {
      border-top: 1px solid rgba(201,168,76,0.20);
      color: rgba(201,168,76,0.85);
      font-size: 0.78rem;
      font-style: italic;
      letter-spacing: 0.04em;
      line-height: 1.5;
      padding-top: 12px;
    }
    .card-weakness strong {
      color: var(--gold);
      display: block;
      font-style: normal;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .seal {
      bottom: 22px;
      color: rgba(201,168,76,0.32);
      font-family: "Songti SC", serif;
      font-size: 0.95rem;
      letter-spacing: 0.4em;
      position: fixed;
      right: 22px;
      writing-mode: vertical-rl;
      z-index: 5;
    }

    /* ── atmospheric mist (drifting fog) ── */
    .mist-layer {
      inset: 0;
      mix-blend-mode: screen;
      opacity: 0.18;
      pointer-events: none;
      position: fixed;
      z-index: 1;
    }
    .mist-layer::before,
    .mist-layer::after {
      content: '';
      position: absolute;
      inset: -25%;
      background:
        radial-gradient(ellipse 60% 35% at 20% 30%, rgba(180,160,130,0.55), transparent 60%),
        radial-gradient(ellipse 50% 30% at 75% 65%, rgba(150,140,160,0.45), transparent 60%),
        radial-gradient(ellipse 40% 25% at 40% 80%, rgba(120,110,90,0.40), transparent 60%);
      filter: blur(40px);
    }
    .mist-layer::before { animation: panMist 38s linear infinite; }
    .mist-layer::after  { animation: panMist 56s linear infinite reverse; opacity: 0.65; }
    @keyframes panMist {
      0%   { transform: translate3d(-8%, -4%, 0); }
      50%  { transform: translate3d(8%, 4%, 0); }
      100% { transform: translate3d(-8%, -4%, 0); }
    }

    /* embers drifting upward */
    .embers { inset: 0; pointer-events: none; position: fixed; z-index: 1; overflow: hidden; }
    .ember {
      background: radial-gradient(circle, rgba(201,168,76,0.85), rgba(192,57,43,0.35) 60%, transparent 70%);
      border-radius: 50%;
      bottom: -10px;
      filter: blur(0.6px);
      height: 4px;
      opacity: 0;
      position: absolute;
      width: 4px;
      animation: emberRise linear infinite;
    }
    @keyframes emberRise {
      0%   { opacity: 0; transform: translate3d(0, 0, 0) scale(0.6); }
      10%  { opacity: 0.85; }
      90%  { opacity: 0.6; }
      100% { opacity: 0; transform: translate3d(var(--drift, 30px), -110vh, 0) scale(1.4); }
    }

    /* lift page content above ambient layers */
    .nav, .page-header, .demon-grid, .seal { position: relative; z-index: 5; }
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 18px max(28px, calc((100vw - 1260px) / 2));
      background: linear-gradient(180deg, rgba(8,4,2,0.92) 0%, rgba(8,4,2,0.78) 70%, rgba(8,4,2,0) 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── header reveal (blur → focus, letter-spacing expand) ── */
    .page-eyebrow, .page-title, .page-sub, .divider {
      animation: titleReveal 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    .page-title    { animation-delay: 0.12s; letter-spacing: -0.04em; }
    .page-sub      { animation-delay: 0.42s; }
    .divider       { animation-delay: 0.6s; transform-origin: center; }
    @keyframes titleReveal {
      0%   { opacity: 0; filter: blur(12px); transform: translateY(8px); letter-spacing: -0.06em; }
      100% { opacity: 1; filter: blur(0);    transform: translateY(0);   letter-spacing: 0.04em; }
    }
    .page-title .cjk { animation: cjkInk 1.4s 0.4s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes cjkInk {
      0%   { opacity: 0; clip-path: inset(0 100% 0 0); filter: blur(6px); }
      100% { opacity: 0.9; clip-path: inset(0 0 0 0); filter: blur(0); }
    }

    /* ── card entry stagger ── */
    .card {
      opacity: 0;
      transform: translateY(28px) scale(0.96);
      animation: cardDrop 0.75s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes cardDrop {
      0%   { opacity: 0; transform: translateY(28px) scale(0.96); filter: blur(6px); }
      100% { opacity: 1; transform: translateY(0)    scale(1);    filter: blur(0); }
    }

    /* ── card hover: mouse-tracked gold/jade border glow ── */
    .card {
      --mx: 50%;
      --my: 50%;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: radial-gradient(220px circle at var(--mx) var(--my),
        rgba(201,168,76,0.95),
        rgba(71,111,98,0.55) 35%,
        rgba(201,168,76,0.0) 70%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 4;
    }
    .card:hover::after { opacity: 1; }

    /* ── ink-bleed pulse inside card on hover ── */
    .ink-pulse {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(180px circle at var(--mx) var(--my),
        rgba(192,57,43,0.22),
        rgba(116,34,25,0.10) 40%,
        transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 2;
      mix-blend-mode: screen;
    }
    .card:hover .ink-pulse { opacity: 1; animation: inkBreathe 4s ease-in-out infinite; }
    @keyframes inkBreathe {
      0%,100% { transform: scale(1);   filter: blur(0); }
      50%     { transform: scale(1.06); filter: blur(2px); }
    }

    /* portrait zoom on hover */
    .card-portrait img,
    .card-portrait .placeholder {
      transition: transform 0.9s cubic-bezier(0.16,1,0.3,1), filter 0.6s ease;
    }
    .card:hover .card-portrait img { transform: scale(1.06); filter: saturate(1.05) contrast(1.08) brightness(0.95); }
    .card:hover .card-portrait .placeholder { transform: scale(1.08); color: rgba(201,168,76,0.55); }

    /* name CJK gets a faint gold underline draw on hover */
    .card-cjk { position: relative; display: inline-block; }
    .card-cjk::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -3px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
    }
    .card:hover .card-cjk::after { transform: scaleX(1); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    @media (max-width: 720px) {
      .nav-group:first-child, .nav-group:nth-child(3) { display: none; }
      .tab { padding: 9px 11px; font-size: 0.7rem; }
      body { padding-top: 92px; }
    }
  </style>
</head>
<body>

<div class="mist-layer" aria-hidden="true"></div>
<div class="embers" id="embers" aria-hidden="true"></div>

<nav class="nav" aria-label="Site navigation">
  <div class="nav-group"><a class="tab" href="index.html">Pilgrim</a></div>
  <div class="nav-group">
    <a class="tab" href="about.html">About</a>
    <a class="tab active" href="demons.html">Demons</a>
    <a class="tab" href="arena.html">Arena</a>
    <a class="tab" href="guide.html">Guide</a>
  </div>
  <div class="nav-group"><a class="tab" href="arena.html">Start</a></div>
</nav>

<header class="page-header">
  <p class="page-eyebrow">八十一难 · Eighty-One Trials</p>
  <h1 class="page-title">The Bestiary<span class="cjk">妖怪谱</span></h1>
  <p class="page-sub">Every demon is a philosophy made flesh. Read its nature. Find the contradiction it cannot survive.</p>
  <hr class="divider">
</header>

<section class="demon-grid" id="grid"></section>

<div class="seal" aria-hidden="true">妖</div>

<script>
const DEMONS = [
  {
    id: 'mirror',
    tier: 'tutorial',
    name: 'The Mirror', cjk: '镜魔',
    portrait: 'tutorialboss.png',
    trait: 'It has no identity. Every word you speak, it returns as praise. To strike it is to feed it.',
    weakness: 'Give it an identity it must reject.',
  },
  {
    id: 'deceiver',
    name: 'The Deceiver', cjk: '白骨精',
    portrait: 'bosses/deceiver.png',
    trait: 'Cannot tell the truth. Everything it says is the opposite of reality.',
    weakness: 'Make it lie about its own defeat — the lie becomes truth.',
  },
  {
    id: 'coward',
    name: 'The Coward', cjk: '沙僧',
    portrait: 'bosses/coward.png',
    trait: 'Flees every confrontation, deflects every challenge. Always finds an exit.',
    weakness: 'Close every exit — make surrender the only road.',
  },
  {
    id: 'narcissist',
    name: 'The Narcissist', cjk: '天蓬元帅',
    portrait: 'bosses/narcissist.png',
    trait: 'Everything is about him. Takes credit for all things. Redirects every topic back to his own greatness.',
    weakness: 'Force him to credit something external he cannot claim.',
  },
  {
    id: 'paralytic',
    name: 'The Paralytic', cjk: '木吒',
    portrait: 'bosses/paralytic.png',
    trait: 'Overthinks everything. Spirals into endless analysis. Never commits.',
    weakness: 'Demand a binary yes or no with no room to escape.',
  },
  {
    id: 'contrarian',
    name: 'The Contrarian', cjk: '牛魔王',
    portrait: 'bosses/contrarian.png',
    trait: 'Automatically disagrees with everything. Opposes every claim, every statement.',
    weakness: 'Get it to disagree with itself.',
  },
  {
    id: 'heavenswill',
    tier: 'boss',
    name: "Heaven's Will", cjk: '玉帝',
    portrait: 'bosses/heavenswill.png',
    trait: 'Final Boss. Shifts personality every two turns — Deceiver, Coward, Narcissist, Paralytic, Contrarian. Wrong counters make it stronger.',
    weakness: 'Identify the current form. Apply its exact counter — or perish.',
  },
];

const grid = document.getElementById('grid');
DEMONS.forEach((d, i) => {
  const tierClass = d.tier === 'tutorial' ? 'tutorial' : d.tier === 'boss' ? 'boss' : '';
  const tierLabel = d.tier === 'tutorial' ? 'Tutorial' : d.tier === 'boss' ? 'Final Boss' : `Trial ${i}`;
  const portraitHTML = d.portrait
    ? `<img src="${d.portrait}" alt="${d.name}">`
    : `<div class="placeholder">${d.cjk[0]}</div>`;
  const card = document.createElement('article');
  card.className = 'card';
  card.style.animationDelay = (0.15 + i * 0.08) + 's';
  card.innerHTML = `
    <div class="ink-pulse"></div>
    <div class="card-portrait">${portraitHTML}</div>
    <div class="card-body">
      <p class="card-eyebrow ${tierClass}">${tierLabel}</p>
      <h2 class="card-name">${d.name}</h2>
      <p class="card-cjk">${d.cjk}</p>
      <p class="card-trait">${d.trait}</p>
      <div class="card-weakness">
        <strong>Weakness</strong>${d.weakness}
      </div>
    </div>
  `;
  card.addEventListener('pointermove', (e) => {
    const r = card.getBoundingClientRect();
    card.style.setProperty('--mx', ((e.clientX - r.left) / r.width  * 100) + '%');
    card.style.setProperty('--my', ((e.clientY - r.top)  / r.height * 100) + '%');
  });
  grid.appendChild(card);
});

/* drifting embers */
const embers = document.getElementById('embers');
for (let i = 0; i < 22; i++) {
  const e = document.createElement('span');
  e.className = 'ember';
  e.style.left = (Math.random() * 100) + 'vw';
  e.style.setProperty('--drift', (Math.random() * 120 - 60) + 'px');
  e.style.animationDuration = (10 + Math.random() * 14) + 's';
  e.style.animationDelay = (-Math.random() * 20) + 's';
  e.style.opacity = '0';
  embers.appendChild(e);
}
</script>
</body>
</html>
